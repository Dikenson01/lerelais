services:
  - type: web
    name: lerelais-app
    env: node
    region: frankfurt
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lerelais-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: REDIS_URL
        sync: false # À remplir manuellement dans le dashboard Render (ex: Upstash)
      - key: NODE_ENV
        value: production

databases:
  - name: lerelais-db
    region: frankfurt
    plan: free
    databaseName: lerelais
    user: lerelais
